name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    name: pytest
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true
          cache-dependency-glob: uv.lock
      - name: Set up Python
        run: uv python install 3.11
      - name: Sync dependencies
        run: uv sync --frozen --extra netsuite
      # @pytest.mark.live tests self-skip without ANTHROPIC_API_KEY,
      # so the unset-secret default is the correct CI path.
      - name: Run pytest
        run: uv run pytest -q

  lint:
    name: ruff
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true
          cache-dependency-glob: uv.lock
      - name: Set up Python
        run: uv python install 3.11
      - name: Sync dependencies
        run: uv sync --frozen
      - name: ruff check
        run: uv run ruff check src tests

  typecheck:
    name: mypy --strict
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true
          cache-dependency-glob: uv.lock
      - name: Set up Python
        run: uv python install 3.11
      - name: Sync dependencies
        run: uv sync --frozen --extra netsuite
      - name: mypy strict
        run: uv run mypy --strict src
